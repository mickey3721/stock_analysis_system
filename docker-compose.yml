version: '3.8'

services:
  backend:
    build:
      context: ./stock_analysis
      dockerfile: Dockerfile
    container_name: stock-backend
    ports:
      - "8899:8899"
    volumes:
      - ./stock_analysis/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-frontend
    ports:
      - "3006:80"
    depends_on:
      - backend
    restart: unless-stopped
