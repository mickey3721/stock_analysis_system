services:
  backend:
    build:
      context: ./stock_analysis
      dockerfile: Dockerfile
    container_name: stock-backend
    ports:
      - "8899:8899"
    volumes:
      - ./stock_analysis/data:/app/data
      - backend-cache:/app/data/cache
    env_file:
      - .env.snowball
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - stock-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-frontend
    ports:
      - "3006:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge

volumes:
  backend-cache:
    driver: local
